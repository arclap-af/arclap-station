name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest + mypy + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install system libs for libgphoto2 bindings
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgphoto2-dev pkg-config

      - name: Install backend (with dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy arclap_station

      - name: Run tests
        working-directory: backend
        env:
          ARCLAP_TEST_MODE: "1"
        run: pytest -ra -q --cov=arclap_station --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 7

  frontend:
    name: Frontend tests (vitest + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck --if-present

      - name: Unit tests
        working-directory: frontend
        run: npm test --if-present -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  # NOTE: a Playwright e2e job used to live here but it was fictional —
  # there were no Playwright tests or config in the repo, and it started
  # the backend with a non-existent `--mock-camera --listen` CLI flag, so
  # it could never pass. Removed rather than leave a permanently-red gate.
  # A real e2e (Playwright driving the built cockpit against a seeded
  # mock backend) is tracked as a future addition.

  shellcheck:
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck
      - name: Lint install.sh
        run: shellcheck -S warning install.sh
      - name: Lint packaging scripts
        run: shellcheck -S warning packaging/deb/postinst packaging/deb/prerm packaging/deb/postrm
