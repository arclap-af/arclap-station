name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (pytest + mypy + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install system libs for libgphoto2 bindings
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgphoto2-dev pkg-config

      - name: Install backend (with dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: backend
        run: mypy arclap_station

      - name: Run tests
        working-directory: backend
        env:
          ARCLAP_TEST_MODE: "1"
        run: pytest -ra -q --cov=arclap_station --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 7

  frontend:
    name: Frontend tests (vitest + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck --if-present

      - name: Unit tests
        working-directory: frontend
        run: npm test --if-present -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: Playwright happy-path
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend in mock-camera mode
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend with mock camera
        working-directory: backend
        run: |
          python -m arclap_station --mock-camera --listen 127.0.0.1:8080 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:8080/api/health && break
            sleep 1
          done
        env:
          ARCLAP_TEST_MODE: "1"

      - name: Run Playwright happy-path
        working-directory: frontend
        env:
          ARCLAP_BASE_URL: http://127.0.0.1:8080
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  shellcheck:
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck
      - name: Lint install.sh
        run: shellcheck -S warning install.sh
      - name: Lint packaging scripts
        run: shellcheck -S warning packaging/deb/postinst packaging/deb/prerm packaging/deb/postrm
