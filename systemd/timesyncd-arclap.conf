# /etc/systemd/timesyncd.conf.d/50-arclap.conf
#
# NTP fallback ladder for a construction-site Pi. The primary may be
# the customer's site NTP (DHCP option 42); when absent or down we
# walk through public stratum-1/2 servers. Multiple bands across
# providers so a single AS outage doesn't desync the Pi.
#
# Without trusted time:
#   - audit log timestamps drift (forensics breaks)
#   - TLS cert verification fails if Pi clock < cert NotBefore
#   - scheduled captures fire at the wrong hour
#   - photo EXIF DateTimeOriginal is wrong
#
# Order: Cloudflare → Google → pool.ntp.org (anycast → managed → community).

[Time]
NTP=time.cloudflare.com time.google.com
FallbackNTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
RootDistanceMaxSec=5
PollIntervalMinSec=64
PollIntervalMaxSec=1024
