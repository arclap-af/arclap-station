# /etc/systemd/journald.conf.d/50-arclap.conf
#
# Cap journald disk usage so a flaky service on a long-running
# construction-site Pi can't fill the SD card with logs. Without
# this, journald defaults to 10% of /var (~5 GB on a 64 GB SD)
# which we'd rather see free for photo buffering.
#
# - SystemMaxUse limits total journal size on disk
# - SystemMaxFileSize caps each individual journal file
# - MaxRetentionSec ensures we delete entries older than 90 days
#   even if we're under the size cap (privacy: site logs shouldn't
#   sit forever after a project ends)

[Journal]
Storage=persistent
Compress=yes
SystemMaxUse=500M
SystemKeepFree=2G
SystemMaxFileSize=50M
MaxRetentionSec=7776000
ForwardToSyslog=no
ForwardToWall=no
