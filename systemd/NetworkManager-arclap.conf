# /etc/NetworkManager/conf.d/50-arclap.conf
#
# Prefer ethernet over WiFi when both are up, prefer WiFi over cellular.
# Lower route-metric = higher priority.
#
# Without this, NetworkManager assigns route metrics in connection order
# and a Pi plugged into both ethernet and a backup WiFi can end up
# routing uploads over WiFi even when the wired link is faster + cheaper.

[connection-ethernet]
match-device=type:ethernet
ipv4.route-metric=50
ipv6.route-metric=50

[connection-wifi]
match-device=type:wifi
ipv4.route-metric=300
ipv6.route-metric=300

[connection-gsm]
match-device=type:gsm
ipv4.route-metric=600
ipv6.route-metric=600
