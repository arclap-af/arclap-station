# /etc/systemd/resolved.conf.d/50-arclap.conf
#
# DNS resolver fallback for the Pi. The customer's site DHCP-pushed
# resolver is the primary path; we add public resolvers as a fallback
# so a flaky on-site DNS doesn't break HTTPS uploads or NTP lookups.
#
# Choosing multiple providers (Cloudflare + Quad9 + Google) avoids a
# single-provider outage taking the station offline. DNS-over-TLS to
# the fallback resolvers protects the upload destination hostnames
# from on-path DNS tampering on untrusted site networks.

[Resolve]
FallbackDNS=1.1.1.1 9.9.9.9 8.8.8.8 1.0.0.1 149.112.112.112
DNS=
DNSOverTLS=opportunistic
DNSSEC=allow-downgrade
Cache=yes
CacheFromLocalhost=no
ReadEtcHosts=yes
ResolveUnicastSingleLabel=no
